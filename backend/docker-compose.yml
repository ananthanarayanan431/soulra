services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: soulra
      POSTGRES_USER: soulra
      POSTGRES_PASSWORD: soulra
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soulra"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app

volumes:
  pgdata:
